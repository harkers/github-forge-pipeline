name: Home task
description: Capture a personal or household item for Forge-Home.
title: "[GFP-HM-XXX-TBC] "
labels: ["needs-triage", "workstream:home"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to create a structured item for github-forge-pipeline.
        Final item codes should be confirmed during triage.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      description: Confirm the basics so the item lands cleanly.
      options:
        - label: I searched for an existing related issue first
          required: true
        - label: I will use the approved taxonomy and naming model
          required: true
  - type: dropdown
    id: initiative
    attributes:
      label: Home initiative
      options:
        - Forge-Home-Inbox
        - Forge-Home-Life-Easier
        - Forge-Home-Maintenance
        - Forge-Home-Garden
        - Forge-Home-Cover
        - Forge-Home-Travel
        - Forge-Home-Health
    validations:
      required: true
  - type: input
    id: code
    attributes:
      label: Proposed code
      placeholder: ex. GFP-HM-LIFE-TBC
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - P0
        - P1
        - P2
        - P3
        - P4
    validations:
      required: true
  - type: input
    id: due-date
    attributes:
      label: Due date
      placeholder: YYYY-MM-DD or leave blank
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: What needs doing?
      placeholder: Describe the task clearly and practically.
    validations:
      required: true
  - type: textarea
    id: next-action
    attributes:
      label: Next action
      placeholder: What should happen first?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Notes and links
      placeholder: Quotes, product links, reminders, or related references.
    validations:
      required: false
